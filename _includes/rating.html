<!-- Sistema de Calificación de Estrellas -->
{%- assign t = site.data[site.active_lang].strings -%}
<div class="post-rating-container">
  <div class="rating-header">
    <h3>{{ t.rating.question }}</h3>
    <p>{{ t.rating.hint }}</p>
  </div>
  
  <div class="rating-widget">
    <div class="stars-container" data-post-id="{{ page.id | slugify }}">
      <span class="star" data-value="1">★</span>
      <span class="star" data-value="2">★</span>
      <span class="star" data-value="3">★</span>
      <span class="star" data-value="4">★</span>
      <span class="star" data-value="5">★</span>
    </div>
    
    <div class="rating-info">
      <div class="current-rating">
        <span class="rating-value">0.0</span>
        <span class="rating-stars">☆☆☆☆☆</span>
      </div>
      <div class="rating-count">
        <span class="count">0</span> {{ t.rating.count }}
      </div>
    </div>

    <div class="rating-message" style="display: none;">
      {{ t.rating.thanks }}
    </div>
  </div>
</div>
